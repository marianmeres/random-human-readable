<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<title>@marianmeres/random-human-readable — playground</title>
		<meta
			name="description"
			content="Generate random but human-readable strings — passwords, tokens, placeholder text."
		/>
		<!-- Tracks the active (manually toggled) theme; updated by main.ts. -->
		<meta name="theme-color" content="#fafafa" />
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>🔑</text></svg>"
		/>

		<!--
			Styling follows @marianmeres/design-tokens with the Reboot bridge:
			  · reboot.css — Bootstrap Reboot element normalize/reset (consumes --bs-*)
			  · theme.css  — design-tokens "zinc" theme + reboot bridge
			                 (sets --stuic-color-* AND the --bs-* vars; dark on :root.dark)
			  · the inline block below — minimal, token-driven playground layout
		-->
		<link rel="stylesheet" href="./reboot.css" />
		<link rel="stylesheet" href="./theme.css" />

		<!--
			Anti-FOUC: set the dark class before first paint so dark-preference
			users don't flash light. main.ts re-confirms this idempotently.
			The storage key must match THEME_KEY in main.ts.
		-->
		<script>
			try {
				var k = "rhr-playground-theme";
				var s = localStorage.getItem(k);
				var d = s ? s === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
				document.documentElement.classList.toggle("dark", d);
			} catch (e) {}
		</script>

		<style>
			:root {
				color-scheme: light;
			}
			:root.dark {
				color-scheme: dark;
			}
			body {
				min-height: 100vh;
				min-height: 100dvh;
			}

			.app {
				max-width: 56rem;
				margin: 0 auto;
				padding: clamp(1rem, 4vw, 2.5rem) clamp(1rem, 4vw, 2rem);
			}

			.app-header {
				display: flex;
				align-items: flex-start;
				justify-content: space-between;
				gap: 1rem;
				margin-bottom: 1.5rem;
			}
			.app-header h1 {
				margin: 0 0 0.3rem;
				font-size: 1.05rem;
				font-weight: 600;
				line-height: 1.3;
			}
			.app-header h1 a {
				color: inherit;
				text-decoration: none;
			}
			.app-header h1 code {
				color: inherit;
				font-size: 0.95em;
			}
			.lead {
				max-width: 60ch;
				margin: 0;
				color: var(--stuic-color-muted-foreground);
				font-size: 0.9rem;
			}

			.theme-toggle {
				flex: none;
				width: 2.75rem;
				height: 2.75rem;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				border: 1px solid var(--stuic-color-border);
				border-radius: 0.5rem;
				background: var(--stuic-color-surface);
				color: var(--stuic-color-surface-foreground);
				font-size: 1.1rem;
				line-height: 1;
				cursor: pointer;
			}
			.theme-toggle:hover {
				background: var(--stuic-color-surface-hover);
			}

			.controls {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(13rem, 1fr));
				gap: 0.75rem;
				margin-bottom: 1rem;
			}
			.control {
				padding: 0.7rem 0.9rem;
				border: 1px solid var(--stuic-color-border);
				border-radius: 0.6rem;
				background: var(--stuic-color-surface);
			}
			.control--muted {
				color: var(--stuic-color-muted-foreground);
			}
			.control-head {
				display: flex;
				align-items: baseline;
				justify-content: space-between;
				margin-bottom: 0.35rem;
			}
			.control-head label {
				font-size: 0.85rem;
			}
			.control .value {
				font-family: var(--bs-font-monospace);
				font-size: 0.85rem;
				font-variant-numeric: tabular-nums;
				color: var(--stuic-color-foreground);
			}
			.control input[type="range"] {
				width: 100%;
				margin: 0;
				accent-color: var(--stuic-color-primary);
				cursor: pointer;
			}

			.actions {
				display: flex;
				align-items: center;
				justify-content: space-between;
				flex-wrap: wrap;
				gap: 1rem;
				margin-bottom: 1.25rem;
			}
			.switch {
				display: inline-flex;
				align-items: center;
				gap: 0.5rem;
				min-height: 2.75rem;
				font-size: 0.85rem;
				cursor: pointer;
				user-select: none;
			}
			.switch input {
				width: 1.15rem;
				height: 1.15rem;
				accent-color: var(--stuic-color-primary);
				cursor: pointer;
			}

			.btn {
				font: inherit;
				font-size: 0.9rem;
				font-weight: 500;
				min-height: 2.75rem;
				padding: 0.5rem 1.2rem;
				border: 1px solid transparent;
				border-radius: 0.5rem;
				background: var(--stuic-color-primary);
				color: var(--stuic-color-primary-foreground);
				cursor: pointer;
			}
			.btn:hover {
				background: var(--stuic-color-primary-hover);
			}
			.btn:active {
				background: var(--stuic-color-primary-active);
			}

			.results {
				list-style: none;
				margin: 0 0 1.25rem;
				padding: 0;
				display: grid;
				gap: 0.4rem;
			}
			.result {
				display: flex;
				align-items: center;
				justify-content: center;
				position: relative;
				width: 100%;
				min-height: 2.75rem;
				padding: 0.6rem 0.75rem;
				border: 1px solid var(--stuic-color-border);
				border-radius: 0.5rem;
				background: var(--stuic-color-surface);
				color: var(--stuic-color-surface-foreground);
				font-family: var(--bs-font-monospace);
				font-size: 0.95rem;
				text-align: center;
				word-break: break-all;
				cursor: pointer;
				transition: background-color 0.1s ease;
			}
			.result:hover {
				background: var(--stuic-color-surface-hover);
			}
			.result:active {
				background: var(--stuic-color-surface-active);
			}
			/* Backdrop (surface bg + halo) keeps the badge from merging into
			   wrapped result text on narrow screens; no reflow on copy. */
			.result.copied::after {
				content: "Copied!";
				position: absolute;
				right: 0.5rem;
				top: 50%;
				transform: translateY(-50%);
				padding: 0.1rem 0.4rem;
				border-radius: 0.3rem;
				background: var(--stuic-color-surface);
				box-shadow: 0 0 0 0.3rem var(--stuic-color-surface);
				font-family: var(--bs-body-font-family);
				font-size: 0.75rem;
				color: var(--stuic-color-foreground);
				pointer-events: none;
			}

			.results-empty {
				margin: 0 0 1.25rem;
				padding: 1.5rem 0.75rem;
				border: 1px dashed var(--stuic-color-border);
				border-radius: 0.5rem;
				text-align: center;
				color: var(--stuic-color-muted-foreground);
			}

			.info {
				margin: 0;
				color: var(--stuic-color-muted-foreground);
				font-size: 0.8rem;
				line-height: 1.6;
			}
			.info a {
				color: inherit;
				text-decoration: underline;
			}

			:where(.result, .btn, .theme-toggle, .control input, .switch input):focus-visible {
				outline: 2px solid var(--stuic-color-primary);
				outline-offset: 2px;
			}
		</style>

		<script defer src="https://assets.onedollarstats.com/stonks.js"></script>
	</head>
	<body>
		<!-- The whole UI lives in templates; main.ts clones and wires them. -->
		<template id="tpl-app">
			<div class="app">
				<header class="app-header">
					<div>
						<h1>
							<a href="https://github.com/marianmeres/random-human-readable">
								<code>@marianmeres/random-human-readable</code>
							</a>
						</h1>
						<p class="lead">
							Generate random but human-readable strings — handy for
							passwords, tokens, or text placeholders.
						</p>
					</div>
					<button
						type="button"
						class="theme-toggle"
						data-on="click:toggleTheme"
						aria-label="Toggle dark mode"
						title="Toggle dark mode"
					>◐</button>
				</header>

				<section
					class="controls"
					data-ref="controls"
					aria-label="Generator options"
				></section>

				<div class="actions">
					<label class="switch">
						<input
							type="checkbox"
							data-ref="randomizeCase"
							data-on="change:toggleCase"
						/>
						<span>randomize case</span>
					</label>
					<button type="button" class="btn" data-on="click:refresh">
						Refresh
					</button>
				</div>

				<ul class="results" data-ref="results" aria-label="Generated strings"></ul>
				<p class="results-empty" data-ref="empty" hidden>
					Increase a count above to generate something.
				</p>

				<footer class="info">
					Tap any result to copy it to your clipboard. All values are
					generated locally in your browser and never leave it. Author
					<a href="mailto:marian@meres.sk">marian@meres.sk</a>.
					<span data-ref="version"></span>
				</footer>
			</div>
		</template>

		<template id="tpl-control">
			<div class="control">
				<div class="control-head">
					<label data-ref="label"></label>
					<output class="value" data-ref="value"></output>
				</div>
				<input type="range" step="1" data-ref="input" data-on="input:setCount" />
			</div>
		</template>

		<template id="tpl-result">
			<li>
				<button type="button" class="result" data-on="click:copy"></button>
			</li>
		</template>

		<div id="app"></div>

		<script type="module" src="./dist/bundle.js"></script>

		<!-- Google tag (gtag.js) -->
		<script
			async
			src="https://www.googletagmanager.com/gtag/js?id=G-44ECMC95KE"
		></script>
		<script>
			window.dataLayer = window.dataLayer || [];
			function gtag() {
				dataLayer.push(arguments);
			}
			gtag("js", new Date());
			gtag("config", "G-44ECMC95KE");
		</script>
	</body>
</html>
